<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Liftr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Tab Panels -->
    <div id="tab-today" class="tab-panel active"></div>
    <div id="tab-history" class="tab-panel"></div>
    <div id="tab-exercises" class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="today">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6.5 6.5h11M6.5 17.5h11M4 12h16"/>
          <circle cx="4" cy="6.5" r="1.5"/><circle cx="20" cy="6.5" r="1.5"/>
          <circle cx="4" cy="17.5" r="1.5"/><circle cx="20" cy="17.5" r="1.5"/>
        </svg>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-tab="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
        </svg>
        <span>History</span>
      </button>
      <button class="nav-btn" data-tab="exercises">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 10h16M4 14h10M4 18h7"/>
        </svg>
        <span>Exercises</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12m11.32-11.32 2.12-2.12"/>
        </svg>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Sheet Overlay -->
    <div id="sheet-overlay">
      <div id="sheet">
        <div id="sheet-handle-bar"></div>
        <div id="sheet-content"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
